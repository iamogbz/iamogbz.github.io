<link rel="stylesheet" href="./styles/reset.css" />
<style>
  animated-logo {
    scale: 0.5;
  }

  animated-button {
    margin: var(--size-m);
    & span {
      padding: var(--size-sm) var(--size-m);
    }
  }

  #lab-logo {
    height: var(--size-mml);
    background: var(--color-fg);
    border-radius: 100%;
    box-sizing: border-box;
    cursor: pointer;
    padding: var(--size-ssm);
    width: var(--size-mml);
  }

  #lab-header::after {
    content: '';
    display: block;
    height: 100%;
    position: absolute;
    width: 100%;
  }

  #lab {
    margin-bottom: var(--size-m);
  }
</style>
<script src="./index.js" type="module"></script>

<div class="page-section">
  <div class="section-header"><animated-logo></animated-logo></div>
  <animated-button href="profile/emmanuel.html" id="link-profile"
    ><span>PROFILE</span>
  </animated-button>
  <animated-button href="#lab-logo" id="link-projects"
    ><span>PROJECTS</span>
  </animated-button>
</div>
<div class="page-section">
  <a class="section-header" id="lab-header" href="#lab-logo">
    <object
      data="./assets/images/flask.svg"
      id="lab-logo"
      width="48px"
    ></object>
  </a>
  <lab-projects id="lab"></lab-projects>
</div>
<div class="page-section">
  <div class="section-header">
    <animated-button href="https://github.com/iamogbz" id="link-promote"
      ><span>PROMOTE</span>
    </animated-button>
  </div>
</div>
